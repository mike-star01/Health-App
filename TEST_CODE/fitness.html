<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife Workout</title>
    <link rel="stylesheet" href="fitness-style.css">
</head>
<body>
    <header class="header">
        <h1>Workout</h1>
        <div class="header-actions">
            <button class="discard-btn">Discard workout</button>
            <button class="save-btn">Save workout</button>
            <button class="add-btn">Add exercise</button>
        </div>
    </header>

    <!-- Removed duplicate discard button -->
    <div>
        <label for="discard-select">Select Exercise to Discard:</label>
        <select class="discard-select">
            <option value="">Select an exercise to discard</option>
        </select>
        <!-- This button may be unnecessary if you use the discard button in the header -->
    </div>

    <main id="workout-area">
        <!-- Exercise sections will be added dynamically -->
    </main>

    <script src="fitness.js"></script>
</body>
</html>
